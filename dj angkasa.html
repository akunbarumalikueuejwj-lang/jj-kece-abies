<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Putar Lagu Otomatis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #1a202c;
            color: #e2e8f0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
        }
        .container {
            background-color: #2d3748;
            padding: 2.5rem;
            border-radius: 1rem;
            box-shadow: 0 10px 15px rgba(0, 0, 0, 0.2);
            text-align: center;
            max-width: 500px;
            width: 100%;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        h1 {
            font-size: 2.25rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            color: #9f7aea;
        }
        p {
            font-size: 1.125rem;
            line-height: 1.6;
            margin-bottom: 1.5rem;
            color: #cbd5e0;
        }
        .button {
            display: inline-block;
            background-color: #6366f1;
            color: white;
            padding: 0.8rem 2rem;
            border-radius: 0.5rem;
            text-decoration: none;
            font-weight: 600;
            transition: background-color 0.3s ease, transform 0.2s ease;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            cursor: pointer;
            border: none;
        }
        .button:hover {
            background-color: #4f46e5;
            transform: translateY(-2px);
        }
        .message-note {
            margin-top: 2rem;
            font-size: 0.875rem;
            color: #a0aec0;
        }
        audio {
            display: none;
        }
        @media (max-width: 600px) {
            h1 {
                font-size: 1.75rem;
            }
            .container {
                padding: 1.5rem;
            }
            p {
                font-size: 1rem;
            }
            .button {
                padding: 0.7rem 1.5rem;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎵 Lagu Spesial untukmu! 🎵</h1>
        <p>Selamat datang di halaman yang memutar lagu secara otomatis. Nikmati alunan musiknya!</p>

        <!-- Ini adalah tag audio dengan link Google Drive yang Anda berikan -->
        <audio id="myAudio" autoplay loop>
            <source src="https://drive.google.com/uc?export=download&id=1Pew4PcQywMdLUG7mnGf1QEw9qtAXRogm" type="audio/mpeg">
            Browser Anda tidak mendukung elemen audio.
        </audio>

        <button id="playButton" class="button">
            Klik untuk Memulai/Menghentikan Musik
        </button>

        <p class="message-note">
            *Catatan: Beberapa browser modern mungkin memblokir pemutaran otomatis (autoplay). Jika lagu tidak langsung terputar, silakan klik tombol di atas.
        </p>
    </div>

    <script>
        const audio = document.getElementById('myAudio');
        const playButton = document.getElementById('playButton');

        // Mencoba memutar audio saat halaman dimuat
        window.addEventListener('load', () => {
            audio.play().catch(error => {
                console.log("Autoplay diblokir:", error);
            });
        });

        // Event listener untuk tombol manual play/pause
        playButton.addEventListener('click', () => {
            if (audio.paused) {
                audio.play().catch(error => {
                    console.log("Gagal memutar:", error);
                });
            } else {
                audio.pause();
            }
        });
    </script>
</body>
</html>
